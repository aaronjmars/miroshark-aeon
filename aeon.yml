# Aeon configuration — miroshark-aeon
#
# Enable skills by setting enabled: true. Multiple skills at the same time run in parallel.
# Set var: "value" to pass a default parameter to the skill.

skills:
  # === RECURRING SCHEDULE ===

  # --- Daily: Market & Social ---
  token-report: { enabled: true, schedule: "0 6 * * *", model: "claude-sonnet-4-6" }
  fetch-tweets: { enabled: true, schedule: "30 6 * * *", var: "$MIROSHARK OR @miroshark_ OR github.com/aaronjmars/miroshark", model: "claude-sonnet-4-6" }
  repo-pulse: { enabled: true, schedule: "0 10 * * *", model: "claude-sonnet-4-6" }

  # --- Daily: Rewards ---
  tweet-allocator: { enabled: true, schedule: "0 8 * * *", model: "claude-sonnet-4-6" }

  # --- Daily: Shipping & Content ---
  push-recap: { enabled: true, schedule: "0 15 * * *" }
  project-lens: { enabled: true, schedule: "0 16 * * *" }

  # --- Every 2 days: Content & Meta ---
  repo-actions: { enabled: true, schedule: "0 14 */2 * *", model: "claude-sonnet-4-6" }
  repo-article: { enabled: true, schedule: "0 16 * * *" }
  self-improve: { enabled: true, schedule: "0 13 */2 * *" }

  # --- Weekly ---
  weekly-shiplog: { enabled: true, schedule: "0 9 * * 1" }  # Monday morning
  hyperstitions-ideas: { enabled: true, schedule: "0 10 * * 6" }

  # --- Build (Daily) ---
  feature: { enabled: true, schedule: "0 11 * * *" }

  # === HOUSEKEEPING ===
  heartbeat: { enabled: true, schedule: "0 19 * * *", model: "claude-sonnet-4-6" }
  memory-flush: { enabled: true, schedule: "0 18 * * 0,3", model: "claude-sonnet-4-6" }  # Sun + Wed

  # === DISABLED (available on demand) ===
  morning-brief: { enabled: false, schedule: "0 7 * * *" }
  daily-routine: { enabled: false, schedule: "0 7 * * *" }
  rss-digest: { enabled: false, schedule: "0 7 * * *" }
  hacker-news-digest: { enabled: false, schedule: "0 7 * * *" }
  hn-digest: { enabled: false, schedule: "0 7 * * *" }
  paper-digest: { enabled: false, schedule: "0 7 * * *" }
  tweet-digest: { enabled: false, schedule: "0 7 * * *" }
  reddit-digest: { enabled: false, schedule: "0 7 * * *" }
  telegram-digest: { enabled: false, schedule: "30 7 * * *", model: "claude-sonnet-4-6" }
  issue-triage: { enabled: false, schedule: "0 9 * * *" }
  pr-review: { enabled: false, schedule: "0 9 * * *" }
  auto-merge: { enabled: false, schedule: "0 14 * * *" }
  auto-merge-agent-prs: { enabled: false, schedule: "0 18 * * *", model: "claude-sonnet-4-6", var: "" } # daily 18:00 UTC — close the loop on agent-authored PRs by auto-merging green, unblocked ones (author=aeonframework, all checks SUCCESS, no blocking labels). Uses gh pr merge --squash --auto (queues mid-CI merges). 5-PR-per-run cap, 3-attempt retry cap, 24h re-notify dedup on ALL_BLOCKED. Pass dry-run to preview, or owner/repo to scope.
  github-monitor: { enabled: false, schedule: "0 9 * * *" }
  github-issues: { enabled: false, schedule: "0 9 * * *" }
  github-trending: { enabled: false, schedule: "0 9 * * *" }
  github-releases: { enabled: false, schedule: "30 9 * * *" }
  token-alert: { enabled: false, schedule: "0 12 * * *" }
  token-movers: { enabled: false, schedule: "0 12 * * *" }
  trending-coins: { enabled: false, schedule: "0 12 * * *" }
  wallet-digest: { enabled: false, schedule: "0 12 * * *" }
  on-chain-monitor: { enabled: false, schedule: "0 12 * * *" }
  defi-monitor: { enabled: false, schedule: "0 12 * * *" }
  defi-overview: { enabled: false, schedule: "0 12 * * *" }
  treasury-info: { enabled: false, schedule: "0 12 * * *" }
  distribute-tokens: { enabled: false, schedule: "workflow_dispatch", var: "" }
  monitor-polymarket: { enabled: false, schedule: "30 12 * * *", model: "claude-sonnet-4-6" }
  polymarket: { enabled: false, schedule: "0 12 * * *" }
  polymarket-comments: { enabled: false, schedule: "0 13 * * *" }
  monitor-runners: { enabled: false, schedule: "0 12 * * *" }
  token-pick: { enabled: false, schedule: "0 12 * * *" }
  market-context-refresh: { enabled: false, schedule: "0 13 * * *", model: "claude-sonnet-4-6" }
  narrative-tracker: { enabled: false, schedule: "30 13 * * *" }
  unlock-monitor: { enabled: false, schedule: "0 10 * * 1" }
  article: { enabled: false, schedule: "0 14 * * *" }
  technical-explainer: { enabled: false, schedule: "30 14 * * *" }
  digest: { enabled: false, schedule: "0 14 * * *" }
  research-brief: { enabled: false, schedule: "0 14 * * *" }
  deep-research: { enabled: false, schedule: "workflow_dispatch", var: "" }
  last30: { enabled: false, schedule: "workflow_dispatch", var: "" }
