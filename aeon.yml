  code-health: { enabled: false, schedule: "0 16 * * *" }
  changelog: { enabled: false, schedule: "0 16 * * *" }
  build-skill: { enabled: false, schedule: "0 16 * * *" }
  external-feature: { enabled: false, schedule: "30 16 * * *", var: "" }
  vuln-scanner: { enabled: false, schedule: "0 16 * * 6", var: "" }
  skill-security-scan: { enabled: false, schedule: "0 16 * * 1" }
  deploy-prototype: { enabled: false, schedule: "workflow_dispatch", var: "" }
  autoresearch: { enabled: false, schedule: "workflow_dispatch", var: "" }
  create-skill: { enabled: false, schedule: "workflow_dispatch", var: "" }
  auto-workflow: { enabled: false, schedule: "workflow_dispatch", var: "" }
  refresh-x: { enabled: false, schedule: "0 17 * * *" }
  list-digest: { enabled: false, schedule: "0 17 * * *" }
  write-tweet: { enabled: false, schedule: "0 17 * * *" }
