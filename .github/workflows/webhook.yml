name: Aeon Webhook Bridge
run-name: "webhook: ${{ github.event.client_payload.skill || 'invalid' }}${{ github.event.client_payload.var && format(' ({0})', github.event.client_payload.var) || '' }}"

# Listens for repository_dispatch events with event_type "aeon-skill" and
# dispatches the named skill against the Aeon workflow. Lets external systems
# (Zapier, n8n, IFTTT, other GitHub Actions, plain HTTP clients) trigger
# Aeon skills without operator access to the Actions UI.
#
# Call shape:
#   POST /repos/{owner}/{repo}/dispatches
#     { "event_type": "aeon-skill",
#       "client_payload": { "skill": "token-report", "var": "AEON" } }
#
# The dispatch caller's PAT must hold the `repo` scope (private repo) or
# `public_repo` (public repo). For org-wide bridges, scope down via fine-grained
# PAT with `Contents: read` + `Metadata: read` + `Actions: write`.

on:
  repository_dispatch:
    types: [aeon-skill]

permissions:
  contents: read
  actions: write

concurrency:
  group: webhook-${{ github.event.client_payload.skill || github.run_id }}
  cancel-in-progress: false

jobs:
  bridge:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate payload
        id: validate
        env:
          PAYLOAD_SKILL: ${{ github.event.client_payload.skill }}
          PAYLOAD_VAR: ${{ github.event.client_payload.var }}
          PAYLOAD_MODEL: ${{ github.event.client_payload.model }}
        run: |
          set -euo pipefail

          if [[ -z "${PAYLOAD_SKILL:-}" ]]; then
            echo "::error::client_payload.skill is required"
            echo "reason=missing_skill" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          # Slug guard — only allow [a-z0-9-]+ to prevent shell-injection via skill name.
          if ! [[ "$PAYLOAD_SKILL" =~ ^[a-z0-9][a-z0-9-]{0,63}$ ]]; then
            echo "::error::skill name must match ^[a-z0-9][a-z0-9-]{0,63}\$ — got: $PAYLOAD_SKILL"
            echo "reason=bad_slug" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          # Skill must exist locally as a directory under skills/ AND be listed
          # in skills.json (defence in depth — directory check catches custom
          # local skills, registry check catches typos in shipped skill names).
          if [[ ! -d "skills/$PAYLOAD_SKILL" ]]; then
            echo "::error::skills/$PAYLOAD_SKILL/ does not exist"
            echo "reason=unknown_skill" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if ! jq -e --arg slug "$PAYLOAD_SKILL" '.skills[] | select(.slug == $slug)' skills.json > /dev/null; then
            echo "::warning::$PAYLOAD_SKILL not registered in skills.json — dispatching anyway (custom skill)"
          fi

          # Var guard — reject control characters and limit length. Vars are passed
          # to the workflow input verbatim and reach skill prompts as text; we
          # don't shell-interpolate them, so this is conservative but cheap.
          if [[ -n "${PAYLOAD_VAR:-}" ]]; then
            if [[ ${#PAYLOAD_VAR} -gt 512 ]]; then
              echo "::error::var exceeds 512 chars"
              echo "reason=var_too_long" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            if [[ "$PAYLOAD_VAR" == *$'\n'* || "$PAYLOAD_VAR" == *$'\r'* ]]; then
              echo "::error::var must not contain newlines"
              echo "reason=var_bad_chars" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi

          # Model whitelist — if caller supplied a model, it must match an Aeon-supported value.
          if [[ -n "${PAYLOAD_MODEL:-}" ]]; then
            case "$PAYLOAD_MODEL" in
              claude-opus-4-7|claude-sonnet-4-6|claude-haiku-4-5-20251001|gemini-3-pro|gemini-3-flash|gpt-5.2|kimi-k2.5|qwen3-coder)
                ;;
              *)
                echo "::error::model must be one of the supported Aeon models — got: $PAYLOAD_MODEL"
                echo "reason=bad_model" >> "$GITHUB_OUTPUT"
                exit 1
                ;;
            esac
          fi

          echo "skill=$PAYLOAD_SKILL" >> "$GITHUB_OUTPUT"
          echo "var=${PAYLOAD_VAR:-}" >> "$GITHUB_OUTPUT"
          echo "model=${PAYLOAD_MODEL:-}" >> "$GITHUB_OUTPUT"

      - name: Dispatch skill
        env:
          GH_TOKEN: ${{ secrets.GH_GLOBAL || secrets.GITHUB_TOKEN }}
          SKILL: ${{ steps.validate.outputs.skill }}
          VAR: ${{ steps.validate.outputs.var }}
          MODEL: ${{ steps.validate.outputs.model }}
        run: |
          set -euo pipefail

          ARGS=(--ref "${GITHUB_REF_NAME}" -f "skill=$SKILL")
          if [[ -n "$VAR" ]]; then
            ARGS+=(-f "var=$VAR")
          fi
          if [[ -n "$MODEL" ]]; then
            ARGS+=(-f "model=$MODEL")
          fi

          gh workflow run aeon.yml "${ARGS[@]}"
          echo "::notice::Dispatched skill '$SKILL'${VAR:+ with var '$VAR'}${MODEL:+ on $MODEL}"
